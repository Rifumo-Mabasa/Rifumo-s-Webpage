<svg viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Rock -->
  <circle cx="100" cy="100" r="80" fill="#f44336" />
  <text x="100" y="125" font-size="80" text-anchor="middle" fill="white">✊</text>
  
  <!-- Paper -->
  <circle cx="300" cy="100" r="80" fill="#2196f3" />
  <text x="300" y="125" font-size="80" text-anchor="middle" fill="white">✋</text>
  
  <!-- Scissors -->
  <circle cx="500" cy="100" r="80" fill="#4caf50" />
  <text x="500" y="125" font-size="80" text-anchor="middle" fill="white">✌️</text>
</svg>
